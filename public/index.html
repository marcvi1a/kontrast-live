<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live View — Kontrast</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Montserrat:wght@600;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <p>Kontrast · <span id="filter-label-text">Últimas entradas</span></p>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      Ao Vivo
    </div>
  </header>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value" id="count">—</span>
      <span class="stat-label">Na casa</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-group-filter">
      <button class="group-btn active" data-group="members">Membros</button>
      <button class="group-btn" data-group="others">Operacional</button>
      <button class="group-btn secondary" data-group="all">Todos</button>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <span class="filter-label">Filtrar por:</span>
    <button class="filter-btn active" data-minutes="120">2 horas</button>
    <button class="filter-btn" data-minutes="240">4 horas</button>
    <button class="filter-btn" data-minutes="today">Hoje</button>
    <button class="filter-btn secondary" data-minutes="yesterday">Ontem</button>
    <button class="filter-btn secondary" data-minutes="7days">Últimos 7 dias</button>
  </div>

  <!-- Error banner -->
  <div class="error-banner" id="error-banner">
    ⚠ Não foi possível atualizar os dados. Tentando novamente em instantes…
  </div>

  <!-- Members grid (filled by JS) -->
  <div id="members-container">
    <div id="loading-state" class="loading-state">
      <span class="loading-text">Carregando dados...</span>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span class="footer-note">Atualiza automaticamente a cada 1 minuto</span>
    <span id="last-update"></span>
  </footer>

</div>

<script>
  // ─────────────────────────────────────────────────────────────────────────
  // CONFIG — update this URL after deploying to Vercel
  // ─────────────────────────────────────────────────────────────────────────
  const API_URL = "https://kontrast-live.vercel.app/api/live";
  const REFRESH_INTERVAL_MS = 60_000; // 1 minute

  // ─────────────────────────────────────────────────────────────────────────

  let currentIds = new Set();
  let activeFilter = 120; // default: 2 hours (in minutes), or "today" / "yesterday" / "7days"
  let activeGroupFilter = "members"; // "members" | "others" | "all"
  let cachedMembers = []; // cached API response for instant filter switching

  // ─── Filter buttons ───────────────────────────────────────────────────────
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      const val = btn.dataset.minutes;
      activeFilter = (val === "today" || val === "yesterday" || val === "7days") ? val : parseInt(val, 10);

      // Re-filter cached data locally — no API call, no full redraw
      applyFilter();
    });
  });

  // ─── Group filter buttons ─────────────────────────────────────────────────
  document.querySelectorAll(".group-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".group-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeGroupFilter = btn.dataset.group;
      applyFilter();
    });
  });

  // ─── Data fetching ────────────────────────────────────────────────────────

  let prevFilter = activeFilter;
  let prevGroupFilter = activeGroupFilter;
  let isFilterSwitch = false;

  function deduplicateByPerson(members) {
    const seen = new Map();
    for (const m of members) {
      const existing = seen.get(m.id);
      if (!existing) {
        seen.set(m.id, m);
      } else {
        // keep the most recent entry within this period
        const tExisting = existing.entryTime ? new Date(existing.entryTime).getTime() : 0;
        const tNew = m.entryTime ? new Date(m.entryTime).getTime() : 0;
        if (tNew > tExisting) seen.set(m.id, m);
      }
    }
    return Array.from(seen.values());
  }

  function applyFilter() {
    let filtered = filterByTime(cachedMembers);
    // Apply group filter
    if (activeGroupFilter === "members") {
      filtered = filtered.filter(m => m.isMember);
    } else if (activeGroupFilter === "others") {
      filtered = filtered.filter(m => !m.isMember);
    }
    // Deduplicate AFTER filtering — keep most recent entry per person within the period
    filtered = deduplicateByPerson(filtered);
    if (activeFilter === "7days") {
      filtered.sort((a, b) => a.name.localeCompare(b.name, "pt-BR"));
    } else {
      filtered.sort((a, b) => {
        const ta = a.entryTime ? new Date(a.entryTime).getTime() : 0;
        const tb = b.entryTime ? new Date(b.entryTime).getTime() : 0;
        return tb - ta; // most recent first
      });
    }
    // Force full redraw on any filter change for correct sort order
    if (activeFilter !== prevFilter || activeGroupFilter !== prevGroupFilter) {
      currentIds = new Set();
      isFilterSwitch = true;
    }
    prevFilter = activeFilter;
    prevGroupFilter = activeGroupFilter;
    renderMembers(filtered);
    isFilterSwitch = false;
  }

  async function fetchMembers() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      cachedMembers = data.members ?? [];
      applyFilter();
      document.getElementById("error-banner").style.display = "none";
      document.getElementById("last-update").textContent =
        "Atualizado às " + new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
    } catch (err) {
      console.error("Fetch error:", err);
      document.getElementById("error-banner").style.display = "block";
    }
  }

  function filterByTime(members) {
    const now = Date.now();
    if (activeFilter === "today") {
      const startOfDay = new Date();
      startOfDay.setHours(0, 0, 0, 0);
      return members.filter(m => m.entryTime && new Date(m.entryTime).getTime() >= startOfDay.getTime());
    }
    if (activeFilter === "yesterday") {
      const startOfYesterday = new Date();
      startOfYesterday.setDate(startOfYesterday.getDate() - 1);
      startOfYesterday.setHours(0, 0, 0, 0);
      const endOfYesterday = new Date();
      endOfYesterday.setHours(0, 0, 0, 0);
      return members.filter(m => {
        if (!m.entryTime) return false;
        const t = new Date(m.entryTime).getTime();
        return t >= startOfYesterday.getTime() && t < endOfYesterday.getTime();
      });
    }
    if (activeFilter === "7days") {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 7);
      cutoff.setHours(0, 0, 0, 0);
      return members.filter(m => m.entryTime && new Date(m.entryTime).getTime() >= cutoff.getTime());
    }
    const cutoff = now - activeFilter * 60 * 1000;
    return members.filter(m => m.entryTime && new Date(m.entryTime).getTime() >= cutoff);
  }

  function renderMembers(members) {
    const container = document.getElementById("members-container");

    // Remove loading state on first load
    const loadingEl = document.getElementById("loading-state");
    if (loadingEl) loadingEl.remove();

    // Update stats
    document.getElementById("count").textContent = members.length;

    if (members.length === 0) {
      container.innerHTML = `
        <div class="members-grid">
          <div class="empty-state">
            <div class="empty-title">Nenhum membro na casa</div>
            <div class="empty-sub">Nenhuma entrada registrada no período</div>
          </div>
        </div>`;
      currentIds = new Set();
      return;
    }

    const newIds = new Set(members.map(m => m.id));

    // Decide: full redraw or incremental update
    const needsFullRedraw =
      container.querySelector(".members-grid") === null ||
      currentIds.size === 0;

    if (needsFullRedraw) {
      const grid = document.createElement("div");
      grid.className = "members-grid";
      members.forEach((member, i) => {
        const card = buildCard(member);
        if (isFilterSwitch) {
          card.style.animation = "none";
          card.style.opacity = "1";
          card.style.transform = "none";
        } else {
          card.style.animationDelay = `${i * 40}ms`;
        }
        grid.appendChild(card);
      });
      container.innerHTML = "";
      container.appendChild(grid);
    } else {
      const grid = container.querySelector(".members-grid");

      // Remove cards for members no longer matching the filter
      currentIds.forEach(id => {
        if (!newIds.has(id)) {
          const el = grid.querySelector(`[data-id="${id}"]`);
          if (el) {
            el.style.opacity = "0";
            el.style.transform = "scale(0.95)";
            el.style.transition = "opacity 0.3s, transform 0.3s";
            setTimeout(() => el.remove(), 350);
          }
        }
      });

      // Add new ones
      newIds.forEach(id => {
        if (!currentIds.has(id)) {
          const member = members.find(m => m.id === id);
          if (member) {
            const card = buildCard(member);
            grid.prepend(card);
          }
        }
      });
    }

    // Toggle no-photos mode for 7days filter
    const grid = container.querySelector(".members-grid");
    if (grid) grid.classList.toggle("no-photos", activeFilter === "7days");

    currentIds = newIds;
  }

  function buildCard(member) {
    const card = document.createElement("div");
    card.className = "member-card";
    card.dataset.id = member.id;

    const initials = getInitials(member.name);
    const timeStr = formatEntryTime(member.entryTime);

    const fallbackHtml = '<div class="card-avatar-fallback">' + escHtml(initials) + '</div>';
    const photoHtml = member.photo
      ? '<img class="card-photo"' +
        ' src="' + escHtml(member.photo) + '"' +
        ' alt="' + escHtml(member.name) + '"' +
        ' loading="lazy"' +
        ' onerror="this.parentElement.innerHTML=this.dataset.fallback"' +
        ' data-fallback="' + escHtml(fallbackHtml) + '" />'
      : fallbackHtml;

    card.innerHTML =
      photoHtml +
      '<div class="card-info">' +
        '<div class="card-name" title="' + escHtml(member.name) + '">' + escHtml(member.name) + '</div>' +
        '<div class="card-meta">' +
          '<div class="card-time">' + timeStr + '</div>' +
          '<div class="card-door">' + escHtml(member.area ?? '—') + '</div>' +
        '</div>' +
      '</div>';

    return card;
  }

  // ─── Formatting helpers ───────────────────────────────────────────────────

  function formatEntryTime(isoStr) {
    if (!isoStr) return "—";
    const d = new Date(isoStr);
    if (isNaN(d.getTime())) return "—";
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const time = d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
    if (isToday) return time;
    const date = d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" });
    return date + " " + time;
  }

  function getInitials(name) {
    return name
      .split(" ")
      .filter(Boolean)
      .slice(0, 2)
      .map(w => w[0].toUpperCase())
      .join("");
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // ─── Init ────────────────────────────────────────────────────────────────

  fetchMembers();
  setInterval(fetchMembers, REFRESH_INTERVAL_MS);
</script>

</body>
</html>
